<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALATIN őďER TFINAőď / TA∆źRABT</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --primary: #2c3e50;
            --accent: #3498db;
            --accent-hover: #2980b9;
            --text-color: #333333;
            --border-color: #dcdcdc;
            --btn-text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .box {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 1.1rem;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            resize: vertical;
            min-height: 100px;
            background-color: #fafafa;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #fff;
        }

        .quick-keyboard {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .quick-keyboard button {
            flex: 0 0 auto;
            min-width: 38px;
            padding: 8px 12px;
            font-size: 1.1rem;
            background-color: #ecf0f1;
            color: var(--primary);
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .quick-keyboard button:hover {
            background-color: #d5dbdb;
        }

        .quick-keyboard button:active {
            transform: scale(0.95);
        }

        #shiftBtn {
            background-color: #d1d8e0;
            font-weight: bold;
            min-width: 60px;
        }

        #shiftBtn.active {
            background-color: #7f8c8d;
            color: white;
            border-color: #636e72;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .actions button, .main-actions button {
            background-color: var(--accent);
            color: var(--btn-text);
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background-color 0.2s ease;
            flex: 1;
            min-width: 120px;
        }

        .actions button:hover, .main-actions button:hover {
            background-color: var(--accent-hover);
        }

        .actions button.secondary {
            background-color: #7f8c8d;
        }

        .actions button.secondary:hover {
            background-color: #636e72;
        }

        .main-actions {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
            flex-wrap: wrap;
        }

        .main-actions button {
            padding: 14px 20px;
            font-size: 1.1rem;
            background-color: var(--primary);
        }

        .main-actions button:hover {
            background-color: #1a252f;
        }

        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .actions button, .main-actions button {
                flex: 100%;
            }
            .quick-keyboard button {
                padding: 10px;
                font-size: 1.2rem;
                flex-grow: 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ALATIN őďER TFINAőď / TA∆źRABT<br>‚īį‚Ķć‚īį‚Ķú‚ĶČ‚ĶŹ ‚ĶĖ‚ĶĒ ‚Ķú‚īľ‚ĶČ‚ĶŹ‚īį‚ĶĖ / ō£ŔĄōßō™ŔäŔÜ ōļōĪ ō™ōĻōĪōßō®ō™</h1>

    <div class="box">
        <label for="inputStr">Input (Latin):</label>
        <textarea id="inputStr" placeholder="Type here: ∆Ēur'ne…£, Ass-a... (Tip: type -- to instantly get ' )" oninput="convertText()"></textarea>
        
        <div class="quick-keyboard">
            <button type="button" id="shiftBtn" onclick="toggleShift()" title="Toggle Uppercase/Lowercase">‚¨Ü Shift</button>
            <button type="button" onclick="insertChar('-')" title="Dash">-</button>
            <button type="button" onclick="insertChar('\'')" title="Apostrophe">'</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">Šłć</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">…ô</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">Šł•</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">…õ</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">ŠĻõ</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">…£</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">ő≥</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">ŠĻ£</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">ŠĻ≠</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">Ň£</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">Šļď</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">Ňĺ</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)"> ∑</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">«ß</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">ńć</button>
            <button type="button" class="char-btn" onclick="insertChar(this.textContent)">Ňô</button>
       </div>

        <div class="actions">
            <button class="secondary" onclick="clearInput()">Clear Input</button>
            <button onclick="copyToClipboard('inputStr')">Copy Input</button>
        </div>
    </div>

    <div class="box">
        <label for="latinOut">Latin Result:</label>
        <textarea id="latinOut" readonly></textarea>
        <div class="actions">
            <button onclick="copyToClipboard('latinOut')">Copy Latin</button>
        </div>
    </div>

    <div class="box">
        <label for="tifinaghOut">Tifinagh Result:</label>
        <textarea id="tifinaghOut" readonly></textarea>
        <div class="actions">
            <button onclick="copyToClipboard('tifinaghOut')">Copy Tifinagh</button>
        </div>
    </div>

    <div class="box">
        <label for="arabicOut">Arabic Result:</label>
        <textarea id="arabicOut" dir="rtl" readonly></textarea>
        <div class="actions">
            <button onclick="copyToClipboard('arabicOut')">Copy Arabic</button>
        </div>
    </div>

    <div class="main-actions">
        <button onclick="copyAll()">Copy All Results</button>
        <button onclick="downloadFile()">Download TXT</button>
    </div>
</div>

<script>
    const tifinaghMap = {
        'a': '‚īį', 'b': '‚īĪ', 'g': '‚ī≥', 'd': '‚ī∑', 'Šłć': '‚īĻ', 'e': '‚īĽ', '…ô': '', 'f': '‚īľ', 'k': '‚īĹ', 'h': '‚ĶÄ', 'Šł•': '‚ĶÉ', '…õ': '‚ĶĄ', 'őĶ': '‚ĶĄ', 'x': '‚ĶÖ', 'q': '‚Ķá', 'i': '‚ĶČ', 'j': '‚Ķä', 'l': '‚Ķć', 'm': '‚Ķé', 'n': '‚ĶŹ', 'u': '‚Ķď', 'r': '‚ĶĒ', 'ŠĻõ': '‚Ķē', '…£': '‚ĶĖ', 'ő≥': '‚ĶĖ', 's': '‚Ķô', 'ŠĻ£': '‚Ķö', 'c': '‚Ķõ', 't': '‚Ķú', 'ŠĻ≠': '‚Ķü', 'w': '‚Ķ°', 'y': '‚ĶĘ', 'z': '‚Ķ£', 'Šļď': '‚Ķ•', ' ∑': '‚ĶĮ', 'ŠĶí': '‚ĶĮ', '¬į': '‚ĶĮ', '«ß': '‚īĶ', 'Ň£': '‚Ķú', 'ńć': '‚Ķě', 'Ňĺ': '‚ī∑‚Ķ£', 'ŇĺŇĺ': '‚ī∑‚ī∑‚Ķ£', 'Ňô': '‚Ķć',
        'A': '‚īį', 'B': '‚īĪ', 'G': '‚ī≥', 'D': '‚ī∑', 'ŠłĆ': '‚īĻ', 'E': '‚īĽ', '∆Ź': '', 'F': '‚īľ', 'K': '‚īĹ', 'H': '‚ĶÄ', 'Šł§': '‚ĶÉ', '∆ź': '‚ĶĄ', 'őē': '‚ĶĄ', 'X': '‚ĶÖ', 'Q': '‚Ķá', 'I': '‚ĶČ', 'J': '‚Ķä', 'L': '‚Ķć', 'M': '‚Ķé', 'N': '‚ĶŹ', 'U': '‚Ķď', 'R': '‚ĶĒ', 'ŠĻö': '‚Ķē', '∆Ē': '‚ĶĖ', 'őď': '‚ĶĖ', 'S': '‚Ķô', 'ŠĻĘ': '‚Ķö', 'C': '‚Ķõ', 'T': '‚Ķú', 'ŠĻ¨': '‚Ķü', 'W': '‚Ķ°', 'Y': '‚ĶĘ', 'Z': '‚Ķ£', 'Šļí': '‚Ķ•', '«¶': '‚īĶ', 'ŇĘ': '‚Ķú', 'ńĆ': '‚Ķě', 'ŇĹ': '‚ī∑‚Ķ£', 'ŇĹŇĹ': '‚ī∑‚ī∑‚Ķ£', 'Ňė': '‚Ķć'
    };

    const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    
    const sortedTifKeys = Object.keys(tifinaghMap).sort((a, b) => b.length - a.length);
    const tifMapRegex = new RegExp(sortedTifKeys.map(escapeRegExp).join('|'), 'g');
    
    const tagRegex = /\[ltn:(.*?)\]|\\(.*?)\\|\[(.*?)\]/gi;

    let isShifted = false;

    function toggleShift() {
        isShifted = !isShifted;
        const shiftBtn = document.getElementById('shiftBtn');
        const charBtns = document.querySelectorAll('.char-btn');
        
        if (isShifted) {
            shiftBtn.classList.add('active');
            shiftBtn.innerText = '‚¨á Shift';
        } else {
            shiftBtn.classList.remove('active');
            shiftBtn.innerText = '‚¨Ü Shift';
        }

        charBtns.forEach(btn => {
            btn.innerText = isShifted ? btn.innerText.toUpperCase() : btn.innerText.toLowerCase();
        });
        
        document.getElementById('inputStr').focus();
    }

    function insertChar(char) {
        const inputField = document.getElementById('inputStr');
        const start = inputField.selectionStart;
        const end = inputField.selectionEnd;
        const text = inputField.value;
        
        inputField.value = text.substring(0, start) + char + text.substring(end);
        inputField.selectionStart = inputField.selectionEnd = start + char.length;
        
        inputField.focus();
        convertText();
    }

    function convertText() {
        const inputField = document.getElementById('inputStr');
        
        if (inputField.value.includes('--')) {
            const start = inputField.selectionStart;
            const textBefore = inputField.value;
            
            inputField.value = textBefore.replace(/--/g, "'");
            
            const diff = textBefore.length - inputField.value.length;
            inputField.selectionStart = inputField.selectionEnd = start - diff;
        }

        const inputStr = inputField.value;

        let latResult = "";
        let tifResult = "";
        let arResult = "";
        let lastIndex = 0;
        let match;
        
        tagRegex.lastIndex = 0;

        while ((match = tagRegex.exec(inputStr)) !== null) {
            let chunk = inputStr.substring(lastIndex, match.index);
            
            latResult += convertToLatinChunk(chunk);
            tifResult += convertToTifinaghChunk(chunk);
            arResult += convertToArabicChunk(chunk);

            let tagContent = match[1] || match[2] || match[3];
            latResult += tagContent;
            tifResult += tagContent;
            arResult += tagContent;

            lastIndex = tagRegex.lastIndex;
        }
        
        let finalChunk = inputStr.substring(lastIndex);
        latResult += convertToLatinChunk(finalChunk);
        tifResult += convertToTifinaghChunk(finalChunk);
        arResult += convertToArabicChunk(finalChunk);

        document.getElementById('latinOut').value = latResult;
        document.getElementById('tifinaghOut').value = tifResult;
        document.getElementById('arabicOut').value = arResult;
    }

    function convertToLatinChunk(str) {
        let chunk = str;
        // Only replace apostrophe variants with '-' if between two letters
        chunk = chunk.replace(/(?<=\p{L})['`~](?=\p{L})/gu, '-');
        chunk = chunk.replace(/[∆Ź]/g, 'E');
        chunk = chunk.replace(/[…ô]/g, 'e');
        return chunk;
    }

    function convertToTifinaghChunk(str) {
        let chunk = str;
        // Only replace '-' with space, and drop apostrophes, if between letters
        chunk = chunk.replace(/(?<=\p{L})-(?=\p{L})/gu, ' ');
        chunk = chunk.replace(/(?<=\p{L})['`~](?=\p{L})/gu, '');
        
        chunk = chunk.replace(tifMapRegex, m => tifinaghMap[m]);
        
        let prevChunk;
        do {
            prevChunk = chunk;
            chunk = chunk.replace(/([\u2D30-\u2D7F])‚īĽ([\u2D30-\u2D7F])/g, (match, p1, p2) => {
                return p1 === p2 ? match : p1 + p2;
            });
        } while (chunk !== prevChunk);

        return chunk;
    }

    function convertToArabicChunk(str) {
        let chunk = str.toLowerCase();
        
        // Only replace '-' with space, and drop apostrophes, if between letters
        chunk = chunk.replace(/(?<=\p{L})-(?=\p{L})/gu, ' ');
        chunk = chunk.replace(/(?<=\p{L})['`~](?=\p{L})/gu, '');

        // Specific exceptions
        chunk = chunk.replace(/muy/g, 'ŔÖŔąŔä');
        chunk = chunk.replace(/myu/g, 'ŔÖŔäŔŹŔą');
        chunk = chunk.replace(/yi/g, 'ŔäŔźŔä');
        chunk = chunk.replace(/yu/g, 'ŔäŔŹŔą');
        chunk = chunk.replace(/wi/g, 'ŔąŔźŔä');
        chunk = chunk.replace(/wu/g, 'ŔąŔŹŔą');
        chunk = chunk.replace(/ŇĺŇĺ/g, 'ōĮŔĎō≤');

        // Double letters -> Single letter + Shadda
        const consonants = 'bcdfghjklmnpqrstvwxyzŠłćŠł•…õőĶxqŠĻõ…£ő≥ŠĻ£ŠĻ≠Šļď ∑ŠĶí¬į«ßŇ£ńćŇĺŇô';
        const doubleRegex = new RegExp(`([${consonants}])\\1`, 'g');
        chunk = chunk.replace(doubleRegex, '$1ŔĎ');

        // Vowels strictly after a letter
        const allChars = 'abcdefghijklmnopqrstuvwxyzŠłćŠł•…õőĶxqŠĻõ…£ő≥ŠĻ£ŠĻ≠Šļď ∑ŠĶí¬į«ßŇ£ńćŇĺŇôŔĎ';
        chunk = chunk.replace(new RegExp(`([${allChars}])a`, 'g'), '$1ōß');
        chunk = chunk.replace(new RegExp(`([${allChars}])u`, 'g'), '$1Ŕą');
        chunk = chunk.replace(new RegExp(`([${allChars}])i`, 'g'), '$1Ŕä');

        // Drop 'e'
        chunk = chunk.replace(/e/g, '');

        // Final Mapping Dictionary
        const arMap = {
            'a': 'ō£', 'b': 'ō®', 'g': '›£', 'd': 'ōĮ', 'Šłć': 'ō∂', 'f': 'ŔĀ', '…ô': '', 'k': 'ŔÉ', 'h': 'Ŕá', 'Šł•': 'ō≠', '…õ': 'ōĻ', 'őĶ': 'ōĻ', 'x': 'ōģ', 'q': 'Ŕā', 'i': 'ō¶', 'j': 'ō¨', 'l': 'ŔĄ', 'm': 'ŔÖ', 'n': 'ŔÜ', 'u': 'ō§', 'r': 'ōĪ', 'ŠĻõ': 'ŕē', '…£': 'ōļ', 'ő≥': 'ōļ', 's': 'ō≥', 'ŠĻ£': 'ōĶ', 'c': 'ōī', 't': 'ō™', 'ŠĻ≠': 'ō∑', 'w': 'Ŕą', 'y': 'Ŕä', 'z': 'ō≤', 'Šļď': 'ŕė', ' ∑': 'ŔíŗĘę', 'ŠĶí': 'ŔíŗĘę', '¬į': 'ŔíŗĘę', '«ß': 'ōĮō¨', 'Ň£': 'ō™', 'ńć': 'ō™ōī', 'Ňĺ': 'ōĮō≤', 'Ňô': 'ŔĄ'
        };

        const sortedArKeys = Object.keys(arMap).sort((a, b) => b.length - a.length);
        const arMapRegex = new RegExp(sortedArKeys.map(escapeRegExp).join('|'), 'g');
        
        chunk = chunk.replace(arMapRegex, m => arMap[m]);

        return chunk;
    }

    function clearInput() {
        document.getElementById('inputStr').value = '';
        document.getElementById('latinOut').value = '';
        document.getElementById('tifinaghOut').value = '';
        document.getElementById('arabicOut').value = '';
        document.getElementById('inputStr').focus();
    }

    function copyToClipboard(elementId) {
        const el = document.getElementById(elementId);
        if(!el.value) return;
        el.select();
        document.execCommand('copy');
        
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = 'Copied!';
        setTimeout(() => btn.innerText = originalText, 1500);
    }

    function copyAll() {
        const lat = document.getElementById('latinOut').value;
        const tif = document.getElementById('tifinaghOut').value;
        const ar = document.getElementById('arabicOut').value;
        if(!lat && !tif && !ar) return;
        
        const combined = `${lat}\n\n${tif}\n\n${ar}`;
        navigator.clipboard.writeText(combined).then(() => {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'All Copied!';
            setTimeout(() => btn.innerText = originalText, 1500);
        });
    }

    function downloadFile() {
        const input = document.getElementById('inputStr').value;
        const lat = document.getElementById('latinOut').value;
        const tif = document.getElementById('tifinaghOut').value;
        const ar = document.getElementById('arabicOut').value;
        
        if (!input) return alert("Nothing to download!");

        let cleanName = input.replace(/[^a-zA-Z0-9]/g, '_').replace(/__+/g, '_').substring(0, 20);
        if (cleanName.endsWith('_')) cleanName = cleanName.slice(0, -1);
        if (!cleanName) cleanName = "conversion";
        
        const filename = `${cleanName}.txt`;
        const content = `--- INPUT (RAW) ---\n${input}\n\n--- LATIN RESULT ---\n${lat}\n\n--- TIFINAGH RESULT ---\n${tif}\n\n--- ARABIC RESULT ---\n${ar}`;

        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>


</body>
</html>
