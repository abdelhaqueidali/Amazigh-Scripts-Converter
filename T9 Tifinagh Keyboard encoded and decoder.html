<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T9 Tifinagh Converter</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 80%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .mode-selector label {
            font-weight: bold;
            color: #555;
        }

        .mode-selector select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 16px;
            outline: none;
        }

        .input-output {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .input-output label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .input-output textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-size: 16px;
            height: 100px;
            width: 95%;
            box-sizing: border-box;
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .key {
            background-color: #eee;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s ease;
        }

        .key:hover {
            background-color: #ddd;
        }

        .key:active {
            background-color: #ccc;
        }

        #backspace {
            grid-column: 1 / -1;
            background-color: #ddd;
        }

        #backspace:hover {
            background-color: #ccc;
        }

        #backspace:active {
            background-color: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>T9 Tifinagh Converter</h1>

        <div class="mode-selector">
            <label for="appMode">Mode:</label>
            <select id="appMode">
                <option value="multitap">Standard T9 (Multi-tap to type)</option>
                <option value="decode_index">Decode: Key-Index (e.g., 23- = ⴳ)</option>
                <option value="decode_repeat">Decode: Repetitive (e.g., 222- = ⴳ)</option>
                <option value="encode_index">Encode: Text to Key-Index</option>
                <option value="encode_repeat">Encode: Text to Repetitive</option>
            </select>
        </div>

        <div class="input-output">
            <label for="inputCode">Input:</label>
            <textarea id="inputCode" placeholder="Type here or use the virtual keyboard"></textarea>
        </div>

        <div class="input-output">
            <label for="outputText">Output:</label>
            <textarea id="outputText" readonly placeholder="Result will appear here"></textarea>
        </div>

        <div class="keyboard">
            <div class="key" data-key="1">1<br><small>.,?!'\"</small></div>
            <div class="key" data-key="2">2<br><small>ⴰⴱⴳⴷ</small></div>
            <div class="key" data-key="3">3<br><small>ⴹⴻⴼⴽ</small></div>
            <div class="key" data-key="4">4<br><small>ⵀⵃⵄⵅ</small></div>
            <div class="key" data-key="5">5<br><small>ⵇⵉⵊⵍ</small></div>
            <div class="key" data-key="6">6<br><small>ⵎⵏⵓⵔ</small></div>
            <div class="key" data-key="7">7<br><small>ⵕⵖⵙⵚ</small></div>
            <div class="key" data-key="8">8<br><small>ⵛⵜⵟⵡ</small></div>
            <div class="key" data-key="9">9<br><small>ⵢⵣⵥⵯ</small></div>
            <div class="key" data-key="*">*<br><small>Dash (-)</small></div>
            <div class="key" data-key="0">0<br><small>Space</small></div>
            <div class="key" data-key="#">#<br><small>-</small></div>
            <div class="key" id="backspace">Backspace</div>
        </div>
    </div>

    <script>
        const inputCode = document.getElementById('inputCode');
        const outputText = document.getElementById('outputText');
        const appMode = document.getElementById('appMode');
        const keys = document.querySelectorAll('.key:not(#backspace)');
        const backspaceButton = document.getElementById('backspace');

        const t9Mapping = {
            '2': ['ⴰ', 'ⴱ', 'ⴳ', 'ⴷ'],
            '3': ['ⴹ', 'ⴻ', 'ⴼ', 'ⴽ'],
            '4': ['ⵀ', 'ⵃ', 'ⵄ', 'ⵅ'],
            '5': ['ⵇ', 'ⵉ', 'ⵊ', 'ⵍ'],
            '6': ['ⵎ', 'ⵏ', 'ⵓ', 'ⵔ'],
            '7': ['ⵕ', 'ⵖ', 'ⵙ', 'ⵚ'],
            '8': ['ⵛ', 'ⵜ', 'ⵟ', 'ⵡ'],
            '9': ['ⵢ', 'ⵣ', 'ⵥ', 'ⵯ'],
            '0': [' '],
            '1': ['.', ',', '?', '!', '\'', '"'],
            '*': ['*'],
            '#': ['-']
        };

        // Dynamically build encode mappings
        const reverseIndex = {};
        const reverseRepeat = {};
        for (const [key, chars] of Object.entries(t9Mapping)) {
            chars.forEach((char, index) => {
                reverseIndex[char] = key + (index + 1);
                reverseRepeat[char] = key.repeat(index + 1);
            });
        }
        
        // Hard override space behavior for encodings
        reverseIndex[' '] = '0';
        reverseRepeat[' '] = '0';

        // Multi-tap state
        let tapTimeout;
        let lastTapKey = null;
        let tapCount = 0;

        // Reset App State when changing modes
        appMode.addEventListener('change', () => {
            inputCode.value = '';
            outputText.value = '';
            lastTapKey = null;
            clearTimeout(tapTimeout);
        });

        // Handle physical keyboard typing
        inputCode.addEventListener('input', () => {
            lastTapKey = null;
            clearTimeout(tapTimeout);
            processConversion();
        });

        // Handle virtual keyboard clicks
        keys.forEach(keyElement => {
            keyElement.addEventListener('click', () => {
                const key = keyElement.dataset.key;
                const mode = appMode.value;
                const expectsText = ['multitap', 'encode_index', 'encode_repeat'].includes(mode);

                if (expectsText) {
                    // Standard Multi-tap logic
                    clearTimeout(tapTimeout);
                    if (t9Mapping[key]) {
                        if (lastTapKey === key) {
                            tapCount++;
                            const chars = t9Mapping[key];
                            const char = chars[tapCount % chars.length];
                            inputCode.value = inputCode.value.slice(0, -1) + char; // Replace last character
                        } else {
                            lastTapKey = key;
                            tapCount = 0;
                            const char = t9Mapping[key][0];
                            inputCode.value += char; // Append new character
                        }
                        
                        // 1-second timeout before locking the letter in
                        tapTimeout = setTimeout(() => {
                            lastTapKey = null;
                            tapCount = 0;
                        }, 1000); 
                    }
                } else {
                    // Decoding mode (inputting raw codes)
                    if (key === '*') {
                        // Use * as a manual dash delimiter on the virtual keyboard
                        inputCode.value += '-'; 
                    } else {
                        inputCode.value += key;
                        if (mode === 'decode_index') autoAddHyphenIndex();
                    }
                }
                
                processConversion();
            });
        });

        // Virtual Backspace functionality
        backspaceButton.addEventListener('click', () => {
            if (inputCode.value.length > 0) {
                inputCode.value = inputCode.value.slice(0, -1);
                lastTapKey = null;
                clearTimeout(tapTimeout);
                processConversion();
            }
        });

        // Auto-hyphen solely for Index mode 
        function autoAddHyphenIndex() {
            let val = inputCode.value;
            let parts = val.split('-');
            let lastPart = parts[parts.length - 1];
            // Add hyphen if the sequence is 2 chars long (e.g., 23, #1) or is exactly '0'
            if (lastPart.length === 2 || lastPart === '0') {
                inputCode.value += '-';
            }
        }

        // Main Conversion Logic Core
        function processConversion() {
            const mode = appMode.value;
            const text = inputCode.value;

            if (mode === 'multitap') {
                outputText.value = text; 
            } else if (mode === 'decode_index') {
                outputText.value = decodeIndex(text);
            } else if (mode === 'decode_repeat') {
                outputText.value = decodeRepeat(text);
            } else if (mode === 'encode_index') {
                outputText.value = encodeText(text, reverseIndex);
            } else if (mode === 'encode_repeat') {
                outputText.value = encodeText(text, reverseRepeat);
            }
        }

        function encodeText(text, mapping) {
            let res = [];
            for (let char of text.toLowerCase()) {
                if (mapping[char]) {
                    res.push(mapping[char]);
                } else {
                    res.push('?');
                }
            }
            return res.join('-');
        }

        function decodeIndex(text) {
            const segments = text.split('-');
            let result = '';
            for (let seg of segments) {
                seg = seg.trim();
                if (!seg) continue;
                
                if (seg === '0') {
                    result += ' ';
                } else if (seg.length === 2) {
                    const key = seg[0];
                    const count = parseInt(seg[1]);
                    if (t9Mapping[key] && count > 0 && count <= t9Mapping[key].length) {
                        result += t9Mapping[key][count - 1];
                    } else {
                        result += '?';
                    }
                } else {
                    result += '?';
                }
            }
            return result;
        }

        function decodeRepeat(text) {
            const segments = text.split('-');
            let result = '';
            for (let seg of segments) {
                seg = seg.trim();
                if (!seg) continue;
                
                if (seg === '0') {
                    result += ' ';
                } else {
                    const key = seg[0];
                    // Check if all characters in the chunk are identical
                    if (seg.split('').every(c => c === key)) {
                        if (t9Mapping[key]) {
                            const chars = t9Mapping[key];
                            const index = (seg.length - 1) % chars.length;
                            result += chars[index];
                        } else {
                            result += '?';
                        }
                    } else {
                        result += '?'; 
                    }
                }
            }
            return result;
        }
    </script>
</body>
</html>
